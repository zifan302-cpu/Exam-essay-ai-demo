<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>二语考试作文 AI 辅助器 Demo</title>
    <meta name="theme-color" content="#176b87" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="作文 AI" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="input-panel" aria-label="作文生成参数">
        <div class="brand-row">
          <div class="brand-mark" aria-hidden="true">EA</div>
          <div>
            <h1>二语作文 AI 辅助器</h1>
            <p>考试定制 · 个人化表达 · 语料沉淀</p>
          </div>
        </div>

        <form id="essayForm" class="control-form">
          <div class="field-grid two">
            <label class="field">
              <span>考试类型</span>
              <select id="examType" name="examType">
                <option value="ielts">IELTS Task 2</option>
                <option value="postgraduate">考研英语大作文</option>
                <option value="cet">四六级议论文</option>
              </select>
            </label>

            <label class="field">
              <span>目标档位</span>
              <select id="targetBand" name="targetBand">
                <option value="6.5">稳妥 6.5</option>
                <option value="7.0" selected>冲刺 7.0</option>
                <option value="7.5">高分 7.5+</option>
              </select>
            </label>
          </div>

          <div class="field-grid two">
            <label class="field">
              <span>当前水平</span>
              <select id="level" name="level">
                <option value="foundation">基础可用</option>
                <option value="intermediate" selected>中等进阶</option>
                <option value="advanced">冲刺高分</option>
              </select>
            </label>

            <label class="field">
              <span>立场</span>
              <select id="stance" name="stance">
                <option value="balanced" selected>双边后表态</option>
                <option value="support">倾向支持</option>
                <option value="oppose">倾向反对</option>
              </select>
            </label>
          </div>

          <label class="field">
            <span>作文题目</span>
            <textarea id="topic" name="topic" rows="5"></textarea>
          </label>

          <label class="field">
            <span>自己的思路</span>
            <textarea id="ideas" name="ideas" rows="5"></textarea>
          </label>

          <div class="range-field">
            <div class="range-title">
              <span>表达难度</span>
              <strong id="complexityLabel">适中</strong>
            </div>
            <input id="complexity" name="complexity" type="range" min="1" max="5" value="3" />
            <div class="range-scale" aria-hidden="true">
              <span>稳</span>
              <span>自然</span>
              <span>亮眼</span>
            </div>
          </div>

          <div class="button-row">
            <button class="primary-button" type="submit">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 2.75 13.93 8l5.32 1.93-5.32 1.93L12 17.25l-1.93-5.39-5.32-1.93L10.07 8 12 2.75Z" />
                <path d="M19 15.5 20 18l2.5 1-2.5 1-1 2.5-1-2.5-2.5-1 2.5-1 1-2.5Z" />
              </svg>
              <span>生成方案</span>
            </button>
            <button class="ghost-button" id="sampleButton" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4 5.5A2.5 2.5 0 0 1 6.5 3H20v15H6.5A2.5 2.5 0 0 0 4 20.5v-15Z" />
                <path d="M4 20.5A2.5 2.5 0 0 1 6.5 18H20" />
              </svg>
              <span>载入样例</span>
            </button>
          </div>
        </form>
      </aside>

      <main class="workspace" aria-live="polite">
        <header class="workspace-top">
          <div>
            <p class="kicker">Writing Studio</p>
            <h2 id="resultTitle">定制作文方案</h2>
          </div>
          <div class="metrics-strip" aria-label="生成指标">
            <div class="metric">
              <span>匹配度</span>
              <strong id="matchScore">--</strong>
            </div>
            <div class="metric">
              <span>词数</span>
              <strong id="wordCount">--</strong>
            </div>
            <div class="metric">
              <span>语体</span>
              <strong id="toneLabel">--</strong>
            </div>
          </div>
        </header>

        <nav class="tab-bar" aria-label="结果视图">
          <button class="tab-button active" type="button" data-tab="essay">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M7 3h7l4 4v14H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2Z" />
              <path d="M14 3v5h5" />
              <path d="M8.5 12h7" />
              <path d="M8.5 16h7" />
            </svg>
            <span>作文</span>
          </button>
          <button class="tab-button" type="button" data-tab="outline">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M6 6h14" />
              <path d="M6 12h14" />
              <path d="M6 18h14" />
              <path d="M3.5 6h.01" />
              <path d="M3.5 12h.01" />
              <path d="M3.5 18h.01" />
            </svg>
            <span>结构</span>
          </button>
          <button class="tab-button" type="button" data-tab="patterns">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 6h16" />
              <path d="M4 12h10" />
              <path d="M4 18h16" />
              <path d="M17 10.5 20 12l-3 1.5" />
            </svg>
            <span>句型</span>
          </button>
          <button class="tab-button" type="button" data-tab="vocab">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M5 4h10a4 4 0 0 1 4 4v12H8a3 3 0 0 1-3-3V4Z" />
              <path d="M8 4v16" />
              <path d="M11 9h5" />
              <path d="M11 13h4" />
            </svg>
            <span>词汇</span>
          </button>
          <button class="tab-button" type="button" data-tab="diagnosis">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3 4 7v5c0 5 3.5 8 8 9 4.5-1 8-4 8-9V7l-8-4Z" />
              <path d="m9 12 2 2 4-5" />
            </svg>
            <span>诊断</span>
          </button>
        </nav>

        <section class="result-panel active" id="panel-essay">
          <div class="panel-toolbar">
            <div class="pill-row" id="essayTags"></div>
            <div class="toolbar-actions">
              <button class="icon-button" id="copyButton" type="button" title="复制 Markdown">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M8 8h10v12H8z" />
                  <path d="M6 16H4V4h12v2" />
                </svg>
              </button>
              <button class="icon-button" id="downloadButton" type="button" title="导出 Markdown">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 3v12" />
                  <path d="m8 11 4 4 4-4" />
                  <path d="M5 20h14" />
                </svg>
              </button>
            </div>
          </div>
          <article class="essay-output" id="essayOutput"></article>
        </section>

        <section class="result-panel" id="panel-outline">
          <div class="section-heading">
            <p class="kicker">Argument Map</p>
            <h3>文章结构</h3>
          </div>
          <div class="outline-grid" id="outlineOutput"></div>
        </section>

        <section class="result-panel" id="panel-patterns">
          <div class="section-heading">
            <p class="kicker">Sentence Cards</p>
            <h3>可迁移句型</h3>
          </div>
          <div class="card-list" id="patternOutput"></div>
        </section>

        <section class="result-panel" id="panel-vocab">
          <div class="section-heading">
            <p class="kicker">Vocabulary Pack</p>
            <h3>词汇与替换表达</h3>
          </div>
          <div class="vocab-grid" id="vocabOutput"></div>
        </section>

        <section class="result-panel" id="panel-diagnosis">
          <div class="section-heading">
            <p class="kicker">Revision Notes</p>
            <h3>诊断建议</h3>
          </div>
          <div class="diagnosis-layout">
            <div class="score-wheel">
              <div>
                <span id="scoreNumber">--</span>
                <small>目标匹配</small>
              </div>
            </div>
            <div class="diagnosis-list" id="diagnosisOutput"></div>
          </div>
        </section>
      </main>
    </div>

    <div class="toast" id="toast" role="status"></div>
    <script src="app.js"></script>
  </body>
</html>
